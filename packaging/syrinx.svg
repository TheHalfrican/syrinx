<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Syrinx — waveform bars rising and falling like a voice, on a dark tile. -->
  <defs>
    <linearGradient id="s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <rect width="128" height="128" rx="28" fill="#12161c"/>

  <!-- Seven bars, symmetric about centre; rounded caps keep it soft at 24px. -->
  <g fill="url(#s)">
    <rect x="20"  y="56" width="10" height="16" rx="5"/>
    <rect x="36"  y="44" width="10" height="40" rx="5"/>
    <rect x="52"  y="28" width="10" height="72" rx="5"/>
    <rect x="68"  y="20" width="10" height="88" rx="5"/>
    <rect x="84"  y="36" width="10" height="56" rx="5"/>
    <rect x="100" y="52" width="10" height="24" rx="5"/>
  </g>
</svg>

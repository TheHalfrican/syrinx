# Syrinx — Hyprland integration.
# Append to ~/.config/hypr/hyprland.conf (or source this file).

# Toggle the dictation pill: press once to start recording, again to stop,
# transcribe, and paste into the focused window.
bind = SUPER, D, exec, syrinx-dictate toggle

# Optional: make the pill float and skip tiling (belt-and-suspenders — it's a
# layer-shell surface, so the compositor already handles it, but this keeps any
# fallback toplevel tidy).
windowrulev2 = float, class:^(syrinx-dictate)$
windowrulev2 = noborder, class:^(syrinx-dictate)$
